<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ProntuDinamico - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container" style="max-width: 400px;">
        <div class="card shadow border-0 rounded-3">
            <div class="card-body p-4 text-center">
                <h3 class="mb-3 text-primary">🩺 ProntuDinamico</h3>
                <p class="text-muted mb-4">Acesse o portal do médico</p>

                <!-- Mensagens de Alerta (Flash) -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} text-sm py-2" role="alert">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="/login">
                    <div class="form-floating mb-3 text-start">
                        <input type="email" name="email" class="form-control" id="emailInput" placeholder="nome@ufo.br" required>
                        <label for="emailInput">E-mail Cadastrado</label>
                    </div>
                    <div class="form-floating mb-4 text-start">
                        <input type="password" name="senha" class="form-control" id="senhaInput" placeholder="Senha" required>
                        <label for="senhaInput">Senha</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Entrar</button>
                </form>
                <div class="text-sm">
                    Não tem uma conta? <a href="/cadastro" class="text-decoration-none">Cadastre-se aqui</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
