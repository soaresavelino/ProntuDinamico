<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ProntuDinamico - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container" style="max-width: 450px;">
        <div class="card shadow border-0 rounded-3">
            <div class="card-body p-4">
                <h4 class="text-center mb-3 text-success">Criar Conta Médica</h4>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} text-sm py-2" role="alert">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="/cadastro">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CRM</label>
                        <input type="text" name="crm" class="form-control" placeholder="000000/MG" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail profissional</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha de Acesso</label>
                        <input type="password" name="senha" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">Concluir Cadastro</button>
                </form>
                <div class="text-center mt-3 text-sm">
                    Já possui acesso? <a href="/login" class="text-decoration-none">Faça login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
