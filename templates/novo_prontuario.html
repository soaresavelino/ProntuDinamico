<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Prontuário</title>
    <!-- Resolvido o alerta de integridade do CSS externo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Registrar Novo Atendimento</h4>
            </div>
            <div class="card-body">
                
                <!-- Bloco para exibir alertas de erro do Flask (Validação de CPF) -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="/novo" enctype="multipart/form-data">
                    
                    <!-- Nome do Paciente -->
                    <div class="mb-3">
                        <label for="paciente_nome" class="form-label">Nome do Paciente</label>
                        <input type="text" id="paciente_nome" name="paciente_nome" class="form-control" required>
                    </div>

                    <!-- Linha Dupla: Idade e Gênero -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="paciente_idade" class="form-label">Idade do Paciente</label>
                            <input type="number" id="paciente_idade" name="paciente_idade" class="form-control" placeholder="Ex: 29" min="0" max="130" required>
                        </div>
                        <div class="col-md-6">
                            <label for="paciente_genero" class="form-label">Gênero</label>
                            <select id="paciente_genero" name="paciente_genero" class="form-select" required>
                                <option value="">Selecione...</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                                <option value="Não Informado">Prefere não informar</option>
                            </select>
                        </div>
                    </div>

                    <!-- Campo de Contato do Paciente -->
                    <div class="mb-3">
                        <label for="paciente_contato" class="form-label">Telefone / WhatsApp do Paciente</label>
                        <input type="text" id="paciente_contato" name="paciente_contato" class="form-control" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>
                    
                    <!-- CPF do Paciente -->
                    <div class="mb-3">
                        <label for="paciente_cpf" class="form-label">CPF do Paciente</label>
                        <!-- Adicionado placeholder e limite de caracteres para a máscara -->
                        <input type="text" id="paciente_cpf" name="paciente_cpf" class="form-control" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    
                    <!-- Especialidade -->
                    <div class="mb-3">
                        <label for="especialidade" class="form-label">Especialidade Médica</label>
                        <select name="especialidade" id="especialidade" class="form-select" onchange="atualizarCamposDinamicos()" required>
                            <option value="">Selecione...</option>
                            {% for esp in especialidades %}
                                <option value="{{ esp.nome }}">{{ esp.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Arquivo/Exame -->
                    <div class="mb-3">
                        <label for="foto_exame" class="form-label">Anexar Foto de Exame / Prontuário (Opcional)</label>
                        <input type="file" id="foto_exame" name="foto_exame" class="form-control" accept="image/*">
                    </div>

                    <hr>

                    <!-- ÁREA TOTALMENTE DINÂMICA (Montada via Banco de Dados) -->
                    <div id="campos-dinamicos" class="mb-4">
                        <p class="text-muted text-center">Selecione uma especialidade para carregar a ficha clínica.</p>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-secondary">Voltar</a>
                        <button type="submit" class="btn btn-success">Salvar Prontuário</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Resolvido o falso erro do VS Code envolvendo a sintaxe com JSON.parse
        const bancoEspecialidades = JSON.parse('{{ especialidades | tojson | safe }}');

        function atualizarCamposDinamicos() {
            const nomeSelecionado = document.getElementById('especialidade').value;
            const container = document.getElementById('campos-dinamicos');
            container.innerHTML = '';

            const espEncontrada = bancoEspecialidades.find(e => e.nome === nomeSelecionado);

            if (espEncontrada && espEncontrada.campos.length > 0) {
                container.innerHTML = `<h5 class="text-info">Campos de ${espEncontrada.nome}</h5>`;
                
                espEncontrada.campos.forEach(campo => {
                    let inputHTML = '';
                    if (campo.tipo === 'textarea') {
                        inputHTML = `<textarea id="${campo.nome_campo}" name="${campo.nome_campo}" class="form-control" rows="3" required></textarea>`;
                    } else {
                        inputHTML = `<input type="${campo.tipo}" id="${campo.nome_campo}" name="${campo.nome_campo}" class="form-control" required>`;
                    }

                    container.innerHTML += `
                        <div class="mb-3">
                            <label for="${campo.nome_campo}" class="form-label">${campo.rotulo}</label>
                            ${inputHTML}
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<p class="text-muted text-center">Selecione uma especialidade para carregar a ficha clínica.</p>';
            }
        }

        // LÓGICA DA MÁSCARA VISUAL DO CPF
        document.getElementById('paciente_cpf').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, ''); // Remove qualquer caractere que não seja número
            if (value.length > 11) value = value.slice(0, 11); // Garante o limite estrito de 11 dígitos

            // Montagem dinâmica dos pontos e do traço conforme digitação
            value = value.replace(/^(\d{3})(\d)/, '$1.$2');
            value = value.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
            value = value.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d{1,2})$/, '$1.$2.$3-$4');
            
            e.target.value = value;
        });

        // LÓGICA DA MÁSCARA VISUAL DO TELEFONE
        document.getElementById('paciente_contato').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, ''); // Remove o que não for número
            if (value.length > 11) value = value.slice(0, 11); // Limita a 11 dígitos (celular com 9)

            // Aplica a formatação (11) 99999-9999
            value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
            value = value.replace(/(\d{5})(\d)/, '$1-$2');

            e.target.value = value;
        });
    </script>
</body>
</html>
