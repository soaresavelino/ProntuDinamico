version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: prontu_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./data:/docker-entrypoint-initdb.d/json:ro
      - ./mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
    environment:
      MONGO_INITDB_DATABASE: prontu_db

  app:
    build: .
    container_name: prontu_app
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/
    volumes:
      - ./static/uploads:/app/static/uploads

volumes:
  mongo_data:
